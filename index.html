<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>张彬 ♡ 李书瑶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', 'Noto Serif SC', 'STSong', serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #f8d7e8 25%, #fef0f5 50%, #f8d7e8 75%, #fce4ec 100%);
    background-size: 400% 400%;
    animation: bgShift 20s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  .photo {
    display: block;
    pointer-events: none;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(196,68,105,0.3), 0 1px 4px rgba(0,0,0,0.12);
    border: 3px solid rgba(255,255,255,0.85);
    object-fit: cover;
    animation: photoSway 3s ease-in-out infinite alternate;
  }
  @keyframes photoSwayL {
    0%   { transform: translateX(0) rotate(-3deg); }
    100% { transform: translateX(50px) rotate(5deg); }
  }
  @keyframes photoSwayR {
    0%   { transform: translateX(0) rotate(3deg); }
    100% { transform: translateX(-50px) rotate(-5deg); }
  }

  .photo-wrapper {
    position: fixed;
    pointer-events: none;
    z-index: 2;
    animation: photoFall linear forwards;
  }
  @keyframes photoFall {
    0%   { transform: translateY(0); opacity: 0; }
    8%   { opacity: 1; }
    85%  { opacity: 0.9; }
    100% { transform: translateY(115vh); opacity: 0; }
  }

  .star {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .click-heart {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 28px;
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.6); opacity: 1; }
    60%  { transform: translateY(-80px) scale(1.3); opacity: 0.9; }
    100% { transform: translateY(-140px) scale(0.2); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.62);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 36px;
    padding: 50px 48px;
    box-shadow: 0 8px 40px rgba(196,68,105,0.12), 0 2px 8px rgba(196,68,105,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
    text-align: center;
    max-width: 560px;
    width: 92%;
    border: 1px solid rgba(248,165,194,0.25);
  }

  .couple {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .couple-name {
    font-size: 26px;
    font-weight: bold;
    color: #c44569;
    letter-spacing: 3px;
  }
  .couple-heart {
    font-size: 32px;
    animation: heartbeat 1.2s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.18); }
    28% { transform: scale(1); }
    42% { transform: scale(1.12); }
    56% { transform: scale(1); }
  }

  .subtitle { font-size: 15px; color: #b07a8e; letter-spacing: 2px; margin-bottom: 28px; }

  .divider {
    width: 80px; height: 1.5px;
    background: linear-gradient(90deg, transparent, #e77f8a, transparent);
    margin: 0 auto 24px; border-radius: 1px;
  }

  .together-label { font-size: 15px; color: #b07a8e; margin-bottom: 4px; letter-spacing: 2px; }
  .main-days {
    font-size: 80px; font-weight: bold; color: #c44569; line-height: 1;
    font-family: 'Georgia', 'Cormorant Garamond', serif; letter-spacing: -2px;
  }
  .main-days-unit { font-size: 15px; color: #c4859a; margin-bottom: 8px; letter-spacing: 2px; }

  .stat-row {
    display: flex; justify-content: center; align-items: center; gap: 6px; flex-wrap: wrap;
    margin: 24px 0 18px; color: #c4859a; font-size: 14px; letter-spacing: 1.5px;
  }
  .stat-row .num { color: #c44569; font-weight: bold; font-size: 15px; font-family: 'Georgia', 'Cormorant Garamond', serif; }
  .stat-dot { color: #dbb6c4; font-size: 6px; margin: 0 2px; }

  .countdown-box {
    margin-top: 22px; padding: 14px 20px; background: rgba(248,165,194,0.13);
    border-radius: 20px; color: #a0526e; font-size: 14px; letter-spacing: 2px; line-height: 1.9;
  }
  .countdown-box strong { color: #c44569; font-size: 20px; letter-spacing: 1px; }

  .hint {
    margin-top: 24px; font-size: 12px; color: #d4a0b4; letter-spacing: 2px;
    animation: fadeHint 3s ease-in-out infinite;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 1; }
  }

  .music-btn {
    position: fixed; z-index: 10; top: 24px; right: 24px;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1.5px solid rgba(196,68,105,0.25);
    background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
    cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; box-shadow: 0 2px 12px rgba(196,68,105,0.12);
  }
  .music-btn:hover { background: rgba(255,255,255,0.8); transform: scale(1.08); }
  .music-btn.playing { border-color: rgba(196,68,105,0.4); box-shadow: 0 2px 16px rgba(196,68,105,0.2); }
  .music-btn.playing .note { animation: noteSpin 2s linear infinite; }
  @keyframes noteSpin {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(15deg); }
  }

  @media (max-width: 480px) {
    .card { padding: 38px 22px; border-radius: 28px; }
    .main-days { font-size: 56px; }
    .couple-name { font-size: 22px; }
    .couple-heart { font-size: 26px; }
    .stat-row { font-size: 12px; gap: 2px; }
    .stat-row .num { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="couple">
    <span class="couple-name">张 彬</span>
    <span class="couple-heart">💕</span>
    <span class="couple-name">李 书 瑶</span>
  </div>
  <div class="subtitle">2022 · 09 · 22</div>
  <div class="divider"></div>
  <div class="together-label">我们已经在一起</div>
  <div class="main-days" id="totalDays">0</div>
  <div class="main-days-unit">天</div>
  <div class="stat-row">
    <span class="num" id="years">0</span> 年
    <span class="stat-dot">·</span>
    <span class="num" id="months">0</span> 月
    <span class="stat-dot">·</span>
    <span class="num" id="weeks">0</span> 周
    <span class="stat-dot">·</span>
    <span class="num" id="hours">0</span> 小时
    <span class="stat-dot">·</span>
    <span class="num" id="minutes">0</span> 分钟
  </div>
  <div class="countdown-box">
    🌸 距离我们的下一个纪念日还有<br>
    <strong id="countdown">0 天</strong>
  </div>
  <div class="hint">💛 点击屏幕会有惊喜哦</div>
</div>

<button class="music-btn" id="musicBtn" title="播放音乐">
  <span class="note">🎵</span>
</button>
<audio id="bgMusic" loop preload="auto" style="display:none"></audio>

const MUSIC_FILE = 'music.mp3';

// petals
const petalChars = ['🌸','💮','🌷','✿','❀','🩷','🌺','💐','🏵️'];
function spawnPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = petalChars[Math.floor(Math.random() * petalChars.length)];
  el.style.left = Math.random() * 100 + '%';
  el.style.top = '-40px';
  el.style.fontSize = (14 + Math.random() * 22) + 'px';
  el.style.animationDuration = (9 + Math.random() * 14) + 's';
  el.style.animationDelay = Math.random() * 3 + 's';
  el.style.opacity = 0.5 + Math.random() * 0.5;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 27000);
}
for (let i = 0; i < 16; i++) { setTimeout(spawnPetal, i * 350); }
setInterval(spawnPetal, 2000);

// falling photos
function spawnPhoto() {
  if (PHOTOS.length === 0) return;
  const src = PHOTOS[Math.floor(Math.random() * PHOTOS.length)];
  const wrapper = document.createElement('div');
  wrapper.className = 'photo-wrapper';
  wrapper.style.left = (10 + Math.random() * 80) + '%';
  wrapper.style.top = '-100px';
  wrapper.style.animationDuration = (10 + Math.random() * 14) + 's';
  const img = document.createElement('img');
  img.className = 'photo';
  img.src = src;
  const size = 50 + Math.random() * 45;
  img.style.width = size + 'px';
  img.style.height = size + 'px';
  img.style.animationName = Math.random() > 0.5 ? 'photoSwayR' : 'photoSwayL';
  img.style.animationDuration = (2.5 + Math.random() * 3.5) + 's';
  wrapper.appendChild(img);
  document.body.appendChild(wrapper);
  setTimeout(() => wrapper.remove(), 28000);
}
if (PHOTOS.length > 0) {
  spawnPhoto(); spawnPhoto(); spawnPhoto();
  setInterval(spawnPhoto, 4500);
}

// stars
const starChars = ['✨','⭐','·','✦','⋆','˚','✧'];
for (let i = 0; i < 30; i++) {
  const el = document.createElement('div');
  el.className = 'star';
  el.textContent = starChars[Math.floor(Math.random() * starChars.length)];
  el.style.setProperty('--dur', (2 + Math.random() * 3.5) + 's');
  el.style.setProperty('--delay', Math.random() * 4 + 's');
  el.style.left = Math.random() * 96 + '%';
  el.style.top = Math.random() * 96 + '%';
  el.style.fontSize = (9 + Math.random() * 15) + 'px';
  document.body.appendChild(el);
}

// click hearts
document.addEventListener('click', function(e) {
  const hearts = ['💕','💖','❤️','🩷','💗','💝','💘'];
  for (let i = 0; i < 3; i++) {
    const h = document.createElement('div');
    h.className = 'click-heart';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = (e.clientX - 14 + (Math.random() - 0.5) * 40) + 'px';
    h.style.top  = (e.clientY - 14 + (Math.random() - 0.5) * 20) + 'px';
    h.style.animationDelay = i * 0.08 + 's';
    h.style.fontSize = (22 + Math.random() * 18) + 'px';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 1400);
  }
});

// time
const MS_DAY = 86400000;
function update() {
  const now = new Date();
  const diffMs = now - START_DATE;
  const totalDays = Math.floor(diffMs / MS_DAY);
  document.getElementById('totalDays').textContent = totalDays.toLocaleString();
  const years = now.getFullYear() - START_DATE.getFullYear();
  const anniThisYear = new Date(now.getFullYear(), START_DATE.getMonth(), START_DATE.getDate(), 12, 0, 0);
  const lastAnni = anniThisYear <= now ? anniThisYear : new Date(now.getFullYear() - 1, START_DATE.getMonth(), START_DATE.getDate(), 12, 0, 0);
  const daysSinceAnni = Math.floor((now - lastAnni) / MS_DAY);
  document.getElementById('years').textContent = years;
  document.getElementById('months').textContent = Math.floor(daysSinceAnni / 30);
  document.getElementById('weeks').textContent = Math.floor(totalDays / 7);
  document.getElementById('hours').textContent = Math.floor(diffMs / 3600000).toLocaleString();
  document.getElementById('minutes').textContent = Math.floor(diffMs / 60000).toLocaleString();
  const nextAnni = anniThisYear <= now ? new Date(now.getFullYear() + 1, START_DATE.getMonth(), START_DATE.getDate(), 12, 0, 0) : anniThisYear;
  document.getElementById('countdown').textContent = Math.ceil((nextAnni - now) / MS_DAY) + ' 天';
}
update();
setInterval(update, 1000);

// music
const audio = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
const noteEl = musicBtn.querySelector('.note');
let playing = false;
audio.src = MUSIC_FILE;
function toggleMusic() {
  if (playing) {
    audio.pause();
    playing = false;
    musicBtn.classList.remove('playing');
    noteEl.textContent = '🎵';
  } else {
    audio.play().then(() => {
      playing = true;
      musicBtn.classList.add('playing');
      noteEl.textContent = '🎶';
    }).catch(() => {});
  }
}
musicBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMusic();
});
document.addEventListener('click', function(e) {
  if (e.target !== musicBtn && !playing) toggleMusic();
});
</script>
