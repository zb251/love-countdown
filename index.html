<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>张彬 ♡ 李书瑶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', 'Noto Serif SC', 'STSong', serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #f8d7e8 25%, #fef0f5 50%, #f8d7e8 75%, #fce4ec 100%);
    background-size: 400% 400%;
    animation: bgShift 20s ease infinite;
    transition: background 8s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  .photo {
    display: block;
    pointer-events: none;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(196,68,105,0.3), 0 1px 4px rgba(0,0,0,0.12);
    border: 3px solid rgba(255,255,255,0.85);
    object-fit: cover;
    animation: photoSway 3s ease-in-out infinite alternate;
  }
  @keyframes photoSwayL {
    0%   { transform: translateX(0) rotate(-3deg); }
    100% { transform: translateX(50px) rotate(5deg); }
  }
  @keyframes photoSwayR {
    0%   { transform: translateX(0) rotate(3deg); }
    100% { transform: translateX(-50px) rotate(-5deg); }
  }

  .photo-wrapper {
    position: fixed;
    pointer-events: none;
    z-index: 2;
    animation: photoFall linear forwards;
  }
  @keyframes photoFall {
    0%   { transform: translateY(0); opacity: 0; }
    8%   { opacity: 1; }
    85%  { opacity: 0.9; }
    100% { transform: translateY(115vh); opacity: 0; }
  }

  .star {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .click-heart {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 28px;
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.6); opacity: 1; }
    60%  { transform: translateY(-80px) scale(1.3); opacity: 0.9; }
    100% { transform: translateY(-140px) scale(0.2); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.62);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 36px;
    padding: 50px 48px;
    box-shadow: 0 8px 40px rgba(196,68,105,0.12), 0 2px 8px rgba(196,68,105,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
    text-align: center;
    max-width: 560px;
    width: 92%;
    border: 1px solid rgba(248,165,194,0.25);
  }

  .couple {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .couple-name {
    font-size: 26px;
    font-weight: bold;
    color: #c44569;
    letter-spacing: 3px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 12px;
    transition: all 0.3s ease;
    border: 2px solid transparent;
  }
  .couple-name:hover { background: rgba(196,68,105,0.06); }
  .couple-name.me {
    border-color: rgba(196,68,105,0.35);
    background: rgba(196,68,105,0.08);
    box-shadow: 0 0 0 4px rgba(196,68,105,0.06);
  }
  .couple-heart {
    font-size: 32px;
    animation: heartbeat 1.2s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.18); }
    28% { transform: scale(1); }
    42% { transform: scale(1.12); }
    56% { transform: scale(1); }
  }

  .subtitle { font-size: 15px; color: #b07a8e; letter-spacing: 2px; margin-bottom: 28px; }

  .divider {
    width: 80px; height: 1.5px;
    background: linear-gradient(90deg, transparent, #e77f8a, transparent);
    margin: 0 auto 24px; border-radius: 1px;
  }

  .together-label { font-size: 15px; color: #b07a8e; margin-bottom: 4px; letter-spacing: 2px; }
  .main-days {
    font-size: 80px; font-weight: bold; color: #c44569; line-height: 1;
    font-family: 'Georgia', 'Cormorant Garamond', serif; letter-spacing: -2px;
  }
  .main-days-unit { font-size: 15px; color: #c4859a; margin-bottom: 8px; letter-spacing: 2px; }

  .stat-row {
    display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap;
    margin: 24px 0 18px; color: #c4859a; font-size: 14px; letter-spacing: 1.5px;
  }
  .stat-item { white-space: nowrap; }
  .stat-row .num { color: #c44569; font-weight: bold; font-size: 15px; font-family: 'Georgia', 'Cormorant Garamond', serif; margin-right: 1px; }

  .countdown-box {
    margin-top: 22px; padding: 14px 20px; background: rgba(248,165,194,0.13);
    border-radius: 20px; color: #a0526e; font-size: 14px; letter-spacing: 2px; line-height: 1.9;
  }
  .countdown-box strong { color: #c44569; font-size: 20px; letter-spacing: 1px; }

  .hint {
    margin-top: 24px; font-size: 12px; color: #d4a0b4; letter-spacing: 2px;
    animation: fadeHint 3s ease-in-out infinite;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 1; }
  }

  /* 信箱 */
  .mailbox-btn {
    position: fixed; z-index: 10; bottom: 28px; right: 28px;
    width: 46px; height: 46px; border-radius: 50%;
    border: 1.5px solid rgba(196,68,105,0.25);
    background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
    cursor: pointer; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; box-shadow: 0 2px 12px rgba(196,68,105,0.12);
  }
  .mailbox-btn:hover { background: rgba(255,255,255,0.8); transform: scale(1.08); }
  .mailbox-btn .badge {
    position: absolute; top: -4px; right: -4px;
    background: #c44569; color: #fff; font-size: 10px; min-width: 18px;
    height: 18px; border-radius: 9px; display: flex; align-items: center;
    justify-content: center; font-family: sans-serif; letter-spacing: 0;
  }

  .mailbox-overlay {
    position: fixed; z-index: 200; inset: 0;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    animation: overlayIn 0.35s ease;
    pointer-events: auto;
  }
  @keyframes overlayIn { 0% { opacity: 0; } 100% { opacity: 1; } }

  .mailbox-container {
    background: linear-gradient(160deg, #fff9fb, #fff5f8, #fff);
    border-radius: 28px; padding: 0; max-width: 440px; width: 90%; max-height: 80vh;
    box-shadow: 0 20px 60px rgba(196,68,105,0.25);
    border: 1px solid rgba(248,165,194,0.35);
    animation: letterIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden; display: flex; flex-direction: column;
  }
  @keyframes letterIn {
    0% { transform: scale(0.75) translateY(40px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .mailbox-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 28px 16px; border-bottom: 1px solid rgba(248,165,194,0.18);
  }
  .mailbox-title { font-size: 18px; color: #c44569; letter-spacing: 3px; font-weight: bold; }
  .mailbox-close {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(196,68,105,0.2);
    background: rgba(255,255,255,0.6); cursor: pointer; font-size: 16px; color: #c44569;
    display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
  }
  .mailbox-close:hover { background: rgba(196,68,105,0.08); }

  .mailbox-list {
    flex: 1; overflow-y: auto; padding: 16px 24px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .mailbox-empty { text-align: center; color: #c4859a; padding: 40px 0; letter-spacing: 2px; font-size: 14px; }

  .envelope {
    background: #fff; border-radius: 16px; padding: 16px 18px;
    border: 1px solid rgba(248,165,194,0.2);
    box-shadow: 0 2px 8px rgba(196,68,105,0.06);
    cursor: pointer; transition: all 0.25s ease;
    display: flex; align-items: center; gap: 14px;
  }
  .envelope:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(196,68,105,0.14); border-color: rgba(248,165,194,0.4); }
  .envelope.new { animation: envNew 0.6s ease; }
  @keyframes envNew {
    0% { transform: scale(0.9); background: #fff5f8; }
    100% { transform: scale(1); background: #fff; }
  }
  .envelope-icon { font-size: 32px; flex-shrink: 0; }
  .envelope-info { flex: 1; min-width: 0; }
  .envelope-author { font-size: 12px; color: #c4859a; letter-spacing: 1.5px; margin-bottom: 2px; }
  .envelope-title { font-size: 15px; color: #c44569; font-weight: bold; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .envelope-date { font-size: 11px; color: #dbb6c4; margin-top: 3px; letter-spacing: 1px; }
  .envelope-arrow { color: #dbb6c4; font-size: 14px; flex-shrink: 0; }

  .mailbox-footer { padding: 12px 24px 20px; border-top: 1px solid rgba(248,165,194,0.18); }
  .mailbox-compose-btn {
    width: 100%; padding: 13px; border-radius: 20px; letter-spacing: 2px;
    border: 1.5px dashed rgba(196,68,105,0.3); background: rgba(248,165,194,0.08);
    color: #c44569; font-size: 15px; cursor: pointer; transition: all 0.3s ease;
  }
  .mailbox-compose-btn:hover { background: rgba(248,165,194,0.18); border-style: solid; }

  /* 写信面板 */
  .compose-panel { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .compose-author-toggle {
    display: flex; gap: 10px; justify-content: center;
  }
  .compose-author-btn {
    padding: 8px 22px; border-radius: 18px; border: 1px solid rgba(196,68,105,0.2);
    background: rgba(255,255,255,0.5); cursor: pointer; font-size: 14px;
    color: #b07a8e; letter-spacing: 2px; transition: all 0.3s ease;
  }
  .compose-author-btn.active { background: #c44569; color: #fff; border-color: #c44569; }
  .compose-input {
    width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid rgba(196,68,105,0.2);
    font-size: 15px; color: #5a3a4a; background: rgba(255,255,255,0.7); outline: none;
    letter-spacing: 1px; font-family: inherit;
    transition: border-color 0.3s ease;
  }
  .compose-input:focus { border-color: rgba(196,68,105,0.5); }
  .compose-textarea {
    width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid rgba(196,68,105,0.2);
    font-size: 14px; color: #5a3a4a; background: rgba(255,255,255,0.7); outline: none;
    letter-spacing: 1px; font-family: inherit; resize: none; line-height: 1.8;
    transition: border-color 0.3s ease;
  }
  .compose-textarea:focus { border-color: rgba(196,68,105,0.5); }
  .compose-actions { display: flex; gap: 10px; }
  .compose-send {
    flex: 1; padding: 12px; border-radius: 20px; border: none;
    background: #c44569; color: #fff; font-size: 15px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.3s ease;
  }
  .compose-send:hover { background: #b03d5e; }
  .compose-cancel {
    padding: 12px 20px; border-radius: 20px; border: 1px solid rgba(196,68,105,0.2);
    background: rgba(255,255,255,0.6); color: #b07a8e; font-size: 14px;
    letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease;
  }
  .compose-cancel:hover { background: rgba(255,255,255,0.9); }

  /* 信件详情 */
  .letter-view { padding: 28px 28px 20px; text-align: center; }
  .letter-view-icon { font-size: 52px; margin-bottom: 6px; }
  .letter-view-author { font-size: 13px; color: #c4859a; letter-spacing: 2px; margin-bottom: 4px; }
  .letter-view-title { font-size: 20px; color: #c44569; font-weight: bold; letter-spacing: 2px; margin-bottom: 4px; }
  .letter-view-date { font-size: 11px; color: #dbb6c4; letter-spacing: 1px; margin-bottom: 16px; }
  .letter-view-body { font-size: 15px; color: #7a4a5c; line-height: 2.1; letter-spacing: 1px; }
  .letter-view-back {
    margin-top: 20px; padding: 10px 28px; border-radius: 20px;
    border: 1px solid rgba(196,68,105,0.25); background: rgba(255,255,255,0.6);
    color: #c44569; font-size: 14px; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease;
  }
  .letter-view-back:hover { background: rgba(196,68,105,0.06); }

  /* 对方打开提醒 */
  .visitor-indicator {
    position: fixed; z-index: 10; top: 24px; left: 24px;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    opacity: 0; transform: translateY(-10px); transition: all 0.5s ease;
    pointer-events: none;
  }
  .visitor-indicator.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .visitor-dot {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
    border: 1.5px solid rgba(196,68,105,0.25);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    box-shadow: 0 2px 12px rgba(196,68,105,0.12);
    transition: all 0.3s ease;
  }
  .visitor-dot.pulse { animation: visitorPulse 2s ease-in-out infinite; }
  @keyframes visitorPulse {
    0%, 100% { box-shadow: 0 2px 12px rgba(196,68,105,0.12); }
    50% { box-shadow: 0 2px 24px rgba(196,68,105,0.4), 0 0 0 6px rgba(255,107,138,0.15); }
  }
  .visitor-label {
    background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
    border-radius: 16px; padding: 6px 14px; font-size: 12px;
    color: #a0526e; letter-spacing: 1.5px; white-space: nowrap;
    border: 1px solid rgba(248,165,194,0.2);
    box-shadow: 0 2px 8px rgba(196,68,105,0.08);
  }

  .music-btn {
    position: fixed; z-index: 10; top: 24px; right: 24px;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1.5px solid rgba(196,68,105,0.25);
    background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
    cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; box-shadow: 0 2px 12px rgba(196,68,105,0.12);
  }
  .music-btn:hover { background: rgba(255,255,255,0.8); transform: scale(1.08); }
  .music-btn.playing { border-color: rgba(196,68,105,0.4); box-shadow: 0 2px 16px rgba(196,68,105,0.2); }
  .music-btn.playing .note { animation: noteSpin 2s linear infinite; }
  @keyframes noteSpin {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(15deg); }
  }

  @media (max-width: 480px) {
    body { overflow-y: auto; overflow-x: hidden; }
    .card { padding: 32px 20px 28px; border-radius: 28px; width: 92%; max-width: 380px; }
    .couple { gap: 10px; margin-bottom: 8px; }
    .couple-name { font-size: 20px; letter-spacing: 2px; padding: 5px 10px; border-radius: 12px; border-width: 1.5px; }
    .couple-name.me { box-shadow: 0 0 0 3px rgba(196,68,105,0.06); }
    .couple-heart { font-size: 24px; }
    .subtitle { font-size: 14px; margin-bottom: 22px; letter-spacing: 2px; }
    .divider { margin-bottom: 20px; }
    .together-label { font-size: 14px; margin-bottom: 2px; letter-spacing: 2px; }
    .main-days { font-size: 56px; letter-spacing: -1px; }
    .main-days-unit { font-size: 13px; margin-bottom: 6px; letter-spacing: 2px; }

    /* 统计行：flex换行，数字+单位在一行 */
    .stat-row { gap: 4px 8px; margin: 18px 0 14px; font-size: 12px; }
    .stat-item {
      display: inline-flex; flex-direction: row; align-items: baseline;
      background: rgba(248,165,194,0.08); border-radius: 10px;
      padding: 5px 9px;
    }
    .stat-row .num { font-size: 15px; margin-right: 1px; }

    .countdown-box { padding: 14px 16px; font-size: 13px; border-radius: 18px; letter-spacing: 1.5px; line-height: 2; }
    .countdown-box strong { font-size: 18px; }
    .hint { font-size: 11px; margin-top: 20px; letter-spacing: 1px; line-height: 1.6; }

    /* 按钮 */
    .music-btn { top: 14px; right: 14px; width: 42px; height: 42px; font-size: 19px; }
    .mailbox-btn { bottom: 22px; right: 14px; width: 44px; height: 44px; font-size: 22px; }
    .mailbox-btn .badge { top: -3px; right: -3px; font-size: 9px; min-width: 17px; height: 17px; }

    /* 来访提醒 */
    .visitor-indicator { top: 14px; left: 14px; gap: 0; }
    .visitor-dot { width: 38px; height: 38px; font-size: 17px; }
    .visitor-label { display: none; }

    /* 信箱 */
    .mailbox-container { width: 94%; max-height: 78vh; border-radius: 22px; }
    .mailbox-header { padding: 20px 22px 14px; }
    .mailbox-title { font-size: 17px; letter-spacing: 2px; }
    .mailbox-close { width: 34px; height: 34px; font-size: 17px; }
    .mailbox-list { padding: 14px 18px; gap: 10px; }
    .envelope { padding: 14px 16px; border-radius: 14px; gap: 12px; }
    .envelope-icon { font-size: 28px; }
    .envelope-title { font-size: 14px; }
    .envelope-author { font-size: 11px; }
    .envelope-date { font-size: 10px; }
    .envelope-arrow { font-size: 16px; }
    .mailbox-footer { padding: 12px 18px 18px; }
    .mailbox-compose-btn { font-size: 14px; padding: 12px; letter-spacing: 2px; }
    .mailbox-empty { padding: 32px 0; font-size: 13px; }

    /* 写信面板 */
    .compose-panel { padding: 16px 18px; gap: 12px; }
    .compose-author-btn { padding: 8px 18px; font-size: 13px; letter-spacing: 1.5px; }
    .compose-input { font-size: 15px; padding: 10px 14px; }
    .compose-textarea { font-size: 14px; padding: 10px 14px; line-height: 1.8; }
    .compose-send { font-size: 14px; padding: 11px; letter-spacing: 2px; }
    .compose-cancel { font-size: 13px; padding: 11px 18px; }

    /* 信件详情 */
    .letter-view { padding: 24px 20px 18px; }
    .letter-view-icon { font-size: 44px; }
    .letter-view-author { font-size: 12px; }
    .letter-view-title { font-size: 18px; }
    .letter-view-date { font-size: 11px; margin-bottom: 18px; }
    .letter-view-body { font-size: 15px; line-height: 2; }
    .letter-view-back { font-size: 13px; padding: 10px 24px; margin-top: 22px; }

    /* 照片缩小 */
    .photo { border-radius: 10px; border-width: 2px; }
  }

  @media (max-width: 370px) {
    .card { padding: 26px 14px 22px; border-radius: 24px; }
    .couple { gap: 6px; }
    .couple-name { font-size: 17px; letter-spacing: 1px; padding: 4px 8px; }
    .couple-heart { font-size: 21px; }
    .subtitle { font-size: 12px; margin-bottom: 18px; }
    .main-days { font-size: 44px; }
    .main-days-unit { font-size: 12px; }
    .stat-row { gap: 4px 6px; font-size: 11px; }
    .stat-item { padding: 4px 6px; min-width: 34px; border-radius: 8px; }
    .stat-row .num { font-size: 15px; }
    .countdown-box { font-size: 11px; padding: 10px 12px; }
    .countdown-box strong { font-size: 16px; }
    .hint { font-size: 10px; margin-top: 16px; }
    .music-btn { top: 10px; right: 10px; width: 38px; height: 38px; font-size: 17px; }
    .visitor-indicator { top: 10px; left: 10px; }
    .visitor-dot { width: 34px; height: 34px; font-size: 15px; }
    .mailbox-btn { bottom: 16px; right: 10px; width: 40px; height: 40px; font-size: 20px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="couple">
    <span class="couple-name" id="nameZhang">张 彬</span>
    <span class="couple-heart">💕</span>
    <span class="couple-name" id="nameLi">李 书 瑶</span>
  </div>
  <div class="subtitle">2022 · 09 · 22</div>
  <div class="divider"></div>
  <div class="together-label">我们已经在一起</div>
  <div class="main-days" id="totalDays">0</div>
  <div class="main-days-unit">天</div>
  <div class="stat-row">
    <span class="stat-item"><span class="num" id="years">0</span>年</span>
    <span class="stat-item"><span class="num" id="months">0</span>月</span>
    <span class="stat-item"><span class="num" id="weeks">0</span>周</span>
    <span class="stat-item"><span class="num" id="days">0</span>天</span>
    <span class="stat-item"><span class="num" id="hours">0</span>小时</span>
    <span class="stat-item"><span class="num" id="minutes">0</span>分钟</span>

<script>
const START_DATE = new Date('2022-09-22T12:00:00');
const PHOTOS = ['021713786d41bda65fa247a87b114ab6.jpg', '08dc11a992b2489b37ab186ecff87267.jpg', '13724663ed48273606d676f061b95432.jpg', '2a8c7d40cfa92298dd4c98ce753e1557.jpg', '3785ab6a300ce2f982a104b9ec415328.jpg', '4281ce8bd17622d089c5127e6f239f7c.jpg', '4eeb13cd12ab6c27211ba2954b517fb2.jpg', '4eee3370404d61d1f2c938b9ba28934e.jpg', '4f91054fecb5cb39f315f65b359a6d97.jpg', '50bf92b68d9783c84fc6d3979a54e520.jpg', '519248ebab2eec5d880ccfaa87dcf17f.jpg', '6122c49c87a36100af3f33db7fe7e515.jpg', '618d35e18e03f85604de4c9b6d87b7cf.jpg', '782d2deba16f1ec4544c00a0470d1ce7.jpg', '795fea5e17a176243c535bab28488c27.jpg', '796d951d980319df3f40d112da9f3953.jpg', '7ae6def3c30b4877397983b302ce63c7.jpg', '7ee0bd0c36878dd9827de4de370807e4.jpg', '8b9a1a6fb2875120094d0ae3503be35c.jpg', '9b0371b79e436aca718e6516021a2fb3.jpg', 'a4277cae1c934343a9740a5b5adb101b.jpg', 'a6b7151663a38140ee1232d7cea22f2e.jpg', 'c8478ff61afe970b537e77b8e36adb1c.jpg', 'c859d75819bf4d2ac840972c6dee1123.jpg', 'cd77981fb9887b4a52503eb8e5c8abab.jpg', 'd1b1a67a00644693581ea00e15b73074.jpg', 'd654e8fcceef79d8a82ef90bc7dbe346.jpg', 'e082831a55363eaba46e2d164b075748.jpg', 'ef6d2e1fe497d85a5b3f356fa099f89c.jpg', 'f4f1d19cb5a02a0ce30626add41aa74b.jpg'];

// petals
const petalChars = ['🌸','💮','🌷','✿','❀','🩷','🌺','💐','🏵️'];
function spawnPetal() {
  const el = document.createElement('div');

for (let i = 0; i < (window.innerWidth < 480 ? 8 : 16); i++) { setTimeout(spawnPetal, i * 350); }
setInterval(spawnPetal, window.innerWidth < 480 ? 3500 : 2000);

// falling photos
function spawnPhoto() {
  if (PHOTOS.length === 0) return;
  const src = PHOTOS[Math.floor(Math.random() * PHOTOS.length)];
  const wrapper = document.createElement('div');
  wrapper.className = 'photo-wrapper';
  wrapper.style.left = (10 + Math.random() * 80) + '%';

  const isMobile = window.innerWidth < 480;

// stars
const starChars = ['✨','⭐','·','✦','⋆','˚','✧'];
for (let i = 0; i < 30; i++) {

  el.className = 'star';

  el.style.setProperty('--dur', (2 + Math.random() * 3.5) + 's');
  el.style.setProperty('--delay', Math.random() * 4 + 's');
  el.style.left = Math.random() * 96 + '%';
  el.style.top = Math.random() * 96 + '%';
  el.style.fontSize = (9 + Math.random() * 15) + 'px';
  document.body.appendChild(el);
}

// time
const MS_DAY = 86400000;
function update() {
  const now = new Date();
  const diffMs = now - START_DATE;
  const totalDays = Math.floor(diffMs / MS_DAY);
  document.getElementById('totalDays').textContent = totalDays.toLocaleString();
  const anniThisYear = new Date(now.getFullYear(), START_DATE.getMonth(), START_DATE.getDate(), 12, 0, 0);
  const lastAnni = anniThisYear <= now ? anniThisYear : new Date(now.getFullYear() - 1, START_DATE.getMonth(), START_DATE.getDate(), 12, 0, 0);
  let years = now.getFullYear() - START_DATE.getFullYear();
  if (anniThisYear > now) years--;
  let months = 0, cursor = new Date(lastAnni);
  while (true) {
    const next = new Date(cursor.getFullYear(), cursor.getMonth() + 1, cursor.getDate(), 12, 0, 0);
    if (next > now) break;
    months++; cursor = next;
  }
  document.getElementById('years').textContent = years;
  document.getElementById('months').textContent = months;
  const remainderMs = now - cursor;
  const remainderDays = Math.floor(remainderMs / MS_DAY);
  document.getElementById('weeks').textContent = Math.floor(remainderDays / 7);
  document.getElementById('days').textContent = remainderDays % 7;
  document.getElementById('hours').textContent = Math.floor((remainderMs % MS_DAY) / 3600000);
  document.getElementById('minutes').textContent = Math.floor((remainderMs % 3600000) / 60000);
  document.getElementById('seconds').textContent = Math.floor((remainderMs % 60000) / 1000);
  const nextAnni = anniThisYear <= now ? new Date(now.getFullYear() + 1, START_DATE.getMonth(), START_DATE.getDate(), 12, 0, 0) : anniThisYear;
  document.getElementById('countdown').textContent = Math.ceil((nextAnni - now) / MS_DAY) + ' 天';
}
update();
setInterval(update, 1000);

// music
	const audio = document.getElementById("bgMusic");
	const musicBtn = document.getElementById("musicBtn");
	const noteEl = musicBtn.querySelector(".note");
	let playing = false;
	let loading = false;
	audio.src = MUSIC_FILE;
	audio.load();
	function toggleMusic() {
	  if (playing) {
	    audio.pause();
	    playing = false;
	    musicBtn.classList.remove("playing");
	    noteEl.textContent = "🎵";
	  } else if (!loading) {
	    loading = true;
	    noteEl.textContent = "⏳";
	    musicBtn.classList.add("playing");
	    audio.play().then(() => {
	      playing = true;
	      loading = false;
	      noteEl.textContent = "🎶";
	    }).catch(() => {
	      loading = false;
	      musicBtn.classList.remove("playing");
	      noteEl.textContent = "🎵";
	    });
	  }
	}
	musicBtn.addEventListener("click", (e) => {
	  e.stopPropagation();
	  toggleMusic();
	});

	// --- 信箱 ---
	const PRESET_LETTERS = [
	  { author: '张彬', title: '遇见你', text: '遇见你之前，我不知道时间可以过得这么快，又这么慢。快的是和你在一起的每一天，慢的是等待下一次见你的每一秒。', time: Date.now() - 86400000*270 },
	  { author: '李书瑶', title: '因为是你', text: '有人说爱情是化学反应，有人说爱情是缘分注定。我觉得都不对——爱情就是你。你就是那个让一切变得合理的原因。', time: Date.now() - 86400000*180 },
	  { author: '张彬', title: '平行宇宙', text: '有时候我在想，如果平行宇宙真的存在，那在每一个宇宙里，我一定都会找到你，然后重新爱上你。', time: Date.now() - 86400000*90 },
	];

	function loadLetters() {
	  try { return JSON.parse(localStorage.getItem('mailbox_letters') || 'null'); } catch(e) {}
	  return null;
	}
	function saveLetters(letters, sync) {
	  mailboxLetters = letters;
	  try { localStorage.setItem('mailbox_letters', JSON.stringify(letters)); } catch(e) {}
	  if (sync !== false) syncMailboxToCloud();
	}

	// 信箱云端同步
	function getBlobId() { return localStorage.getItem('cloud_blob_id'); }
	function getBlobUrl(id) { return 'https://jsonblob.com/api/jsonBlob/' + id; }
	function syncMailboxToCloud() {
	  const id = getBlobId();
	  if (!id) return;
	  // 先读取现有数据，合并后写入，避免覆盖 lastVisit
	  fetch(getBlobUrl(id))
	    .then(r => r.json())
	    .then(data => {
	      const merged = Object.assign({}, data || {}, { mailbox: mailboxLetters });
	      return fetch(getBlobUrl(id), {
	        method: 'PUT',
	        headers: { 'Content-Type': 'application/json' },
	        body: JSON.stringify(merged)
	      });
	    }).catch(() => {});
	}
	function syncMailboxFromCloud() {
	  const id = getBlobId();
	  if (!id) return;
	  fetch(getBlobUrl(id))
	    .then(r => r.json())
	    .then(data => {
	      if (!data || !data.mailbox || !Array.isArray(data.mailbox)) return;
	      const cloudLetters = data.mailbox;
	      if (cloudLetters.length === 0) return;
	      const merged = [...mailboxLetters];
	      const existingKeys = new Set(merged.map(l => l.author + '|' + l.title + '|' + l.time));
	      let hasNew = false;
	      cloudLetters.forEach(l => {
	        const key = l.author + '|' + l.title + '|' + l.time;
	        if (!existingKeys.has(key)) { merged.push(l); existingKeys.add(key); hasNew = true; }
	      });
	      if (hasNew) {
	        merged.sort((a, b) => a.time - b.time);
	        saveLetters(merged, false);
	        updateBadge();
	      }
	    }).catch(() => {});
	}

	let mailboxLetters = loadLetters();
	if (!mailboxLetters) { mailboxLetters = [...PRESET_LETTERS]; saveLetters(mailboxLetters); }
	// 首次从云端拉取
	setTimeout(() => { syncMailboxFromCloud(); }, 3000);
	setInterval(() => { syncMailboxFromCloud(); }, 15000);

	const mailboxOverlay = document.getElementById('mailboxOverlay');
	const mailboxContainer = document.getElementById('mailboxContainer');
	const mailboxBadge = document.getElementById('mailboxBadge');

	function getIcon(author) { return author === '张彬' ? '💙' : '💗'; }
	function getEnvelopeIcon(author) { return author === '张彬' ? '✉️' : '💌'; }

	function formatTime(ts) {
	  const d = new Date(ts);
	  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' +
	    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
	}

	function updateBadge() {
	  const seen = JSON.parse(localStorage.getItem('mailbox_seen') || '0');
	  const count = mailboxLetters.length - Math.min(seen, mailboxLetters.length);
	  if (count > 0) {
	    mailboxBadge.style.display = 'flex';
	    mailboxBadge.textContent = count > 99 ? '99+' : count;
	  } else {
	    mailboxBadge.style.display = 'none';
	  }
	}

	function markSeen() {
	  localStorage.setItem('mailbox_seen', mailboxLetters.length);
	  updateBadge();
	}

	function renderMailboxList() {
	  const sorted = [...mailboxLetters].reverse();
	  mailboxContainer.innerHTML = `
	    <div class="mailbox-header">
	      <span class="mailbox-title">💌 我们的信箱</span>
	      <button class="mailbox-close" id="mailboxClose">✕</button>
	    </div>
	    <div class="mailbox-list" id="mailboxList">
	      ${sorted.length === 0 ? '<div class="mailbox-empty">📭 信箱还是空的<br>写第一封信吧</div>' : ''}
	      ${sorted.map((l, i) => `
	        <div class="envelope" data-idx="${mailboxLetters.indexOf(l)}">
	          <div class="envelope-icon">${getEnvelopeIcon(l.author)}</div>
	          <div class="envelope-info">
	            <div class="envelope-author">${getIcon(l.author)} ${l.author}</div>
	            <div class="envelope-title">${l.title}</div>
	            <div class="envelope-date">${formatTime(l.time)}</div>
	          </div>
	          <div class="envelope-arrow">›</div>
	        </div>
	      `).join('')}
	    </div>
	    <div class="mailbox-footer">
	      <button class="mailbox-compose-btn" id="mailboxComposeBtn">✍️ 写一封信</button>
	    </div>
	  `;

	  // 绑定信封点击
	  mailboxContainer.querySelectorAll('.envelope').forEach(el => {
	    el.addEventListener('click', () => {
	      const idx = parseInt(el.dataset.idx);
	      showLetter(idx);
	    });
	  });

	  // 关闭按钮
	  mailboxContainer.querySelector('#mailboxClose').addEventListener('click', closeMailbox);
	  // 写信按钮
	  mailboxContainer.querySelector('#mailboxComposeBtn').addEventListener('click', showCompose);
	}

	function showLetter(idx) {
	  const l = mailboxLetters[idx];
	  mailboxContainer.innerHTML = `
	    <div class="letter-view">
	      <div class="letter-view-icon">${getEnvelopeIcon(l.author)}</div>
	      <div class="letter-view-author">${getIcon(l.author)} ${l.author}</div>
	      <div class="letter-view-title">${l.title}</div>
	      <div class="letter-view-date">${formatTime(l.time)}</div>
	      <div class="letter-view-body">${l.text.replace(/\n/g, '<br>')}</div>
	      <button class="letter-view-back" id="letterBack">← 返回信箱</button>
	    </div>
	  `;
	  mailboxContainer.querySelector('#letterBack').addEventListener('click', renderMailboxList);
	  markSeen();
	}

	function showCompose() {
	  mailboxContainer.innerHTML = `
	    <div class="mailbox-header">
	      <span class="mailbox-title">✍️ 写一封信</span>
	      <button class="mailbox-close" id="mailboxClose">✕</button>
	    </div>
	    <div class="compose-panel">
	      <div class="compose-author-toggle">
	        <button class="compose-author-btn active" data-author="张彬">💙 张彬</button>
	        <button class="compose-author-btn" data-author="李书瑶">💗 李书瑶</button>
	      </div>
	      <input class="compose-input" id="composeTitle" placeholder="信的主题..." maxlength="30">
	      <textarea class="compose-textarea" id="composeText" placeholder="写下你想说的话..." rows="5" maxlength="500"></textarea>
	      <div class="compose-actions">
	        <button class="compose-cancel" id="composeCancel">取消</button>
	        <button class="compose-send" id="composeSend">💌 投进信箱</button>
	      </div>
	    </div>
	  `;

	  let selectedAuthor = '张彬';
	  mailboxContainer.querySelectorAll('.compose-author-btn').forEach(btn => {
	    btn.addEventListener('click', () => {
	      selectedAuthor = btn.dataset.author;
	      mailboxContainer.querySelectorAll('.compose-author-btn').forEach(b => b.classList.remove('active'));
	      btn.classList.add('active');
	    });
	  });

	  mailboxContainer.querySelector('#mailboxClose').addEventListener('click', closeMailbox);
	  mailboxContainer.querySelector('#composeCancel').addEventListener('click', renderMailboxList);
	  mailboxContainer.querySelector('#composeSend').addEventListener('click', () => {
	    const title = mailboxContainer.querySelector('#composeTitle').value.trim();
	    const text = mailboxContainer.querySelector('#composeText').value.trim();
	    if (!title || !text) return;
	    mailboxLetters.push({ author: selectedAuthor, title, text, time: Date.now() });
	    saveLetters(mailboxLetters);
	    markSeen();
	    renderMailboxList();
	  });
	}

	function openMailbox() {
	  renderMailboxList();
	  mailboxOverlay.style.display = 'flex';
	  markSeen();
	}
	function closeMailbox() {
	  mailboxOverlay.style.display = 'none';
	}

	mailboxOverlay.addEventListener('click', function(e) {
	  if (e.target === this) closeMailbox();
	});
	document.getElementById('mailboxBtn').addEventListener('click', function(e) {
	  e.stopPropagation();
	  openMailbox();
	});

	updateBadge();

	// --- 身份识别 & 对方打开提醒 ---
	(function() {
	  const indicator = document.getElementById('visitorIndicator');
	  const label = document.getElementById('visitorLabel');
	  const dot = indicator.querySelector('.visitor-dot');
	  const nameZhang = document.getElementById('nameZhang');
	  const nameLi = document.getElementById('nameLi');

	  // 当前浏览者身份
	  let me = localStorage.getItem('viewer_name') || '';
	  function setMe(name) {
	    me = name;
	    localStorage.setItem('viewer_name', name);
	    nameZhang.classList.toggle('me', name === '张彬');
	    nameLi.classList.toggle('me', name === '李书瑶');
	    // 记录本地访问
	    localStorage.setItem('local_last_visit', JSON.stringify({ name: me, time: Date.now() }));
	    syncToCloud();
	  }
	  if (me) {
	    nameZhang.classList.toggle('me', me === '张彬');
	    nameLi.classList.toggle('me', me === '李书瑶');
	  }

	  nameZhang.addEventListener('click', function(e) { e.stopPropagation(); setMe('张彬'); });
	  nameLi.addEventListener('click', function(e) { e.stopPropagation(); setMe('李书瑶'); });

	  // 生成本设备ID
	  let deviceId = localStorage.getItem('device_id');
	  if (!deviceId) { deviceId = 'd' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); localStorage.setItem('device_id', deviceId); }

	  // --- jsonblob.com 跨设备同步 ---
	  const BLOB_ID_KEY = 'cloud_blob_id';
	  const API_BASE = 'https://jsonblob.com/api/jsonBlob';

	  function getBlobUrl(id) { return API_BASE + '/' + id; }

	  // 创建新的共享 blob
	  async function createBlob() {
	    try {
	      const res = await fetch(API_BASE, {
	        method: 'POST',
	        headers: { 'Content-Type': 'application/json' },
	        body: JSON.stringify({ visits: [] })
	      });
	      if (!res.ok) return null;
	      const id = res.headers.get('X-jsonblob-id');
	      if (id) {
	        localStorage.setItem(BLOB_ID_KEY, id);
	        return id;
	      }
	    } catch(e) {}
	    return null;
	  }

	  // 获取或创建 blob ID
	  async function getOrCreateBlobId() {
	    let id = localStorage.getItem(BLOB_ID_KEY);
	    if (id) return id;
	    // 检查URL hash中是否有配对ID（对方分享的）
	    const hash = window.location.hash.slice(1);
	    if (hash && hash.length > 20) {
	      // 验证这个 blob 是否存在
	      try {
	        const res = await fetch(getBlobUrl(hash));
	        if (res.ok) {
	          localStorage.setItem(BLOB_ID_KEY, hash);
	          window.location.hash = '';
	          return hash;
	        }
	      } catch(e) {}
	    }
	    // 创建新 blob
	    id = await createBlob();
	    return id;
	  }

	  function syncToCloud() {
	    if (!me) return;
	    getOrCreateBlobId().then(id => {
	      if (!id) return;
	      // 先读取现有数据，合并后写入，避免覆盖 mailbox
	      fetch(getBlobUrl(id))
	        .then(r => r.json())
	        .then(data => {
	          const merged = Object.assign({}, data || {}, {
	            lastVisit: { name: me, time: Date.now(), device: deviceId }
	          });
	          return fetch(getBlobUrl(id), {
	            method: 'PUT',
	            headers: { 'Content-Type': 'application/json' },
	            body: JSON.stringify(merged)
	          });
	        }).catch(() => {});
	    });
	  }

	  function checkCloud() {
	    if (!me) return;
	    const id = localStorage.getItem(BLOB_ID_KEY);
	    if (!id) return;
	    fetch(getBlobUrl(id))
	      .then(r => r.json())
	      .then(data => {
	        if (!data || !data.lastVisit || !data.lastVisit.name) return;
	        const v = data.lastVisit;
	        if (v.name === me) return;
	        if (v.device === deviceId) return;
	        const elapsed = Math.floor((Date.now() - v.time) / 60000);
	        if (elapsed >= 0 && elapsed < 60) {
	          showIndicator(elapsed <= 0 ? 'Ta 刚刚来过' : elapsed + ' 分钟前 Ta 来过');
	        }
	      }).catch(() => {});
	  }

	  // --- 本地检测（同设备） ---
	  function checkLocal() {
	    if (!me) return;
	    try {
	      const raw = localStorage.getItem('local_last_visit');
	      if (!raw) return;
	      const visit = JSON.parse(raw);
	      if (!visit || visit.name === me) return;
	      const elapsed = Math.floor((Date.now() - visit.time) / 60000);
	      if (elapsed >= 0 && elapsed < 60) {
	        showIndicator(elapsed <= 0 ? 'Ta 刚刚来过' : elapsed + ' 分钟前 Ta 来过');
	      }
	    } catch(e) {}
	  }

	  let indicatorTimer = null;
	  function showIndicator(msg) {
	    if (indicator.classList.contains('visible')) return;
	    indicator.classList.add('visible');
	    dot.classList.add('pulse');
	    label.textContent = msg;
	    clearTimeout(indicatorTimer);
	    indicatorTimer = setTimeout(() => { indicator.classList.remove('visible'); dot.classList.remove('pulse'); }, 18000);
	  }

	  // 点击查看详情 / 复制配对码
	  indicator.addEventListener('click', function() {
	    const blobId = localStorage.getItem(BLOB_ID_KEY);
	    const pairLink = blobId ? (window.location.origin + window.location.pathname + '#' + blobId) : '';
	    let info = '';
	    info += '\n📱 配对码（发给对方粘贴到浏览器）：\n' + (blobId || '未创建');
	    if (pairLink && navigator.clipboard) {
	      navigator.clipboard.writeText(pairLink).then(() => {
	        alert('💓 配对链接已复制！\n\n发给对方打开一次，之后双方自动互通\n\n' + (me ? '你是：' + me : '请先点击名字选择身份'));
	      }).catch(() => {
	        prompt('复制这个链接发给对方，打开一次即可配对：', pairLink);
	      });
	    } else if (blobId) {
	      prompt('复制这个配对码发给对方，在浏览器地址栏粘贴打开即可：', pairLink);
	    } else {
	      alert('💓 ' + (me ? '你是：' + me : '请先点击名字选择身份') + '\n\n配对码尚未生成，请先选择身份');
	    }
	  });

	  // 初始化
	  if (me) {
	    localStorage.setItem('local_last_visit', JSON.stringify({ name: me, time: Date.now() }));
	    syncToCloud();
	  }

	  checkLocal();
	  // 首次延迟检查云端（等 blob 创建完成）
	  setTimeout(() => { checkCloud(); }, 2000);
	  setInterval(() => { checkLocal(); checkCloud(); }, 20000);

	  window.addEventListener('beforeunload', () => {
	    if (me) {
	      localStorage.setItem('local_last_visit', JSON.stringify({ name: me, time: Date.now() }));
	      const blobId = localStorage.getItem(BLOB_ID_KEY);
	      if (blobId) {
	        const payload = JSON.stringify({ lastVisit: { name: me, time: Date.now(), device: deviceId } });
	        try { navigator.sendBeacon(getBlobUrl(blobId), new Blob([payload], {type:'application/json'})); } catch(e) {}
	      }
	    }
	  });
	})();

	// --- 情绪色彩 ---
	(function() {
	  const MOODS = [
	    { s: 0, e: 5,  name: '深夜', colors: ['#d8d0e8', '#c8bcd8', '#dbd0e8', '#c8bcd8', '#d8d0e8'] },
	    { s: 5, e: 7,  name: '日出', colors: ['#f2d8c8', '#f8e0d0', '#fbe8d8', '#f8e0d0', '#f2d8c8'] },
	    { s: 7, e: 10, name: '清晨', colors: ['#fce4ec', '#f8d7e8', '#fef0f5', '#f8d7e8', '#fce4ec'] },
	    { s: 10, e: 14,name: '正午', colors: ['#fff5f2', '#ffeae2', '#fffaf7', '#ffeae2', '#fff5f2'] },
	    { s: 14, e: 17,name: '午后', colors: ['#fff3e6', '#ffe6d4', '#fdf0e0', '#ffe6d4', '#fff3e6'] },
	    { s: 17, e: 19,name: '日落', colors: ['#ffe4d0', '#ffd0bc', '#fce0d0', '#ffd0bc', '#ffe4d0'] },
	    { s: 19, e: 21,name: '黄昏', colors: ['#ecd8e0', '#e0c8d8', '#f0dce4', '#e0c8d8', '#ecd8e0'] },
	    { s: 21, e: 24,name: '夜晚', colors: ['#e0d4e8', '#d0c0e0', '#e8d8f0', '#d0c0e0', '#e0d4e8'] },
	  ];

	  function hexToRgb(hex) {
	    const r = parseInt(hex.slice(1,3), 16);
	    const g = parseInt(hex.slice(3,5), 16);
	    const b = parseInt(hex.slice(5,7), 16);
	    return [r, g, b];
	  }
	  function rgbToHex(r, g, b) {
	    return '#' + [r,g,b].map(v => Math.min(255, Math.max(0, Math.round(v))).toString(16).padStart(2,'0')).join('');
	  }
	  function lerpColors(c1, c2, t) {
	    const a = hexToRgb(c1), b = hexToRgb(c2);
	    return rgbToHex(a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t);
	  }

	  function getGradient() {
	    const now = new Date();
	    const hour = now.getHours() + now.getMinutes() / 60;
	    let m1 = MOODS[0], m2 = MOODS[0];
	    for (let i = 0; i < MOODS.length; i++) {
	      if (hour >= MOODS[i].s && hour < MOODS[i].e) { m1 = MOODS[i]; m2 = MOODS[i]; break; }
	      if (i < MOODS.length - 1 && hour >= MOODS[i].e && hour < MOODS[i+1].s) { m1 = MOODS[i]; m2 = MOODS[i+1]; break; }
	    }
	    let ratio = 0;
	    if (m1 !== m2) {
	      ratio = m2.s > m1.e ? (hour - m1.e) / (m2.s - m1.e) : 0;
	    }
	    const c = [];
	    for (let i = 0; i < 5; i++) { c.push(lerpColors(m1.colors[i], m2.colors[i], ratio)); }
	    return 'linear-gradient(135deg, ' + c[0] + ' 0%, ' + c[1] + ' 25%, ' + c[2] + ' 50%, ' + c[3] + ' 75%, ' + c[4] + ' 100%)';
	  }

	  function updateMood() {
	    document.body.style.background = getGradient();
	  }

	  updateMood();
	  setInterval(updateMood, 60000);
	})();
</script>
