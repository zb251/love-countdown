<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c44569">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="彬♡瑶">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>张彬 ♡ 李书瑶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', 'Noto Serif SC', 'STSong', serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #f8d7e8 25%, #fef0f5 50%, #f8d7e8 75%, #fce4ec 100%);
    background-size: 400% 400%;
    animation: bgShift 20s ease infinite;
    transition: background 8s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  .photo {
    display: block;
    pointer-events: none;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(196,68,105,0.3), 0 1px 4px rgba(0,0,0,0.12);
    border: 3px solid rgba(255,255,255,0.85);
    object-fit: cover;
    animation: photoSway 3s ease-in-out infinite alternate;
  }
  @keyframes photoSwayL {
    0%   { transform: translateX(0) rotate(-3deg); }
    100% { transform: translateX(50px) rotate(5deg); }
  }
  @keyframes photoSwayR {
    0%   { transform: translateX(0) rotate(3deg); }
    100% { transform: translateX(-50px) rotate(-5deg); }
  }

  .photo-wrapper {
    position: fixed;
    pointer-events: none;
    z-index: 2;
    animation: photoFall linear forwards;
  }
  @keyframes photoFall {
    0%   { transform: translateY(0); opacity: 0; }
    8%   { opacity: 1; }
    85%  { opacity: 0.9; }
    100% { transform: translateY(115vh); opacity: 0; }
  }

  .star {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .click-heart {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 28px;
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.6); opacity: 1; }
    60%  { transform: translateY(-80px) scale(1.3); opacity: 0.9; }
    100% { transform: translateY(-140px) scale(0.2); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.62);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 36px;
    padding: 50px 48px;
    box-shadow: 0 8px 40px rgba(196,68,105,0.12), 0 2px 8px rgba(196,68,105,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
    text-align: center;
    max-width: 560px;
    width: 92%;
    border: 1px solid rgba(248,165,194,0.25);
  }

  .couple {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .couple-name {
    font-size: 26px;
    font-weight: bold;
    color: #c44569;
    letter-spacing: 3px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 12px;
    transition: all 0.3s ease;
    border: 2px solid transparent;
  }
  .couple-name:hover { background: rgba(196,68,105,0.06); }
  .couple-name.me {
    border-color: rgba(196,68,105,0.35);
    background: rgba(196,68,105,0.08);
    box-shadow: 0 0 0 4px rgba(196,68,105,0.06);
  }
  .couple-heart {
    font-size: 32px;
    animation: heartbeat 1.2s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.18); }
    28% { transform: scale(1); }
    42% { transform: scale(1.12); }
    56% { transform: scale(1); }
  }

  .subtitle { font-size: 15px; color: #b07a8e; letter-spacing: 2px; margin-bottom: 28px; }

  .divider {
    width: 80px; height: 1.5px;
    background: linear-gradient(90deg, transparent, #e77f8a, transparent);
    margin: 0 auto 24px; border-radius: 1px;
  }

  .together-label { font-size: 15px; color: #b07a8e; margin-bottom: 4px; letter-spacing: 2px; }
  .main-days {
    font-size: 80px; font-weight: bold; color: #c44569; line-height: 1;
    font-family: 'Georgia', 'Cormorant Garamond', serif; letter-spacing: -2px;
  }
  .main-days-unit { font-size: 15px; color: #c4859a; margin-bottom: 8px; letter-spacing: 2px; }

  .stat-row {
    display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap;
    margin: 24px 0 18px; color: #c4859a; font-size: 14px; letter-spacing: 1.5px;
  }
  .stat-item { white-space: nowrap; }
  .stat-row .num { color: #c44569; font-weight: bold; font-size: 15px; font-family: 'Georgia', 'Cormorant Garamond', serif; margin-right: 1px; }

  .countdown-box {
    margin-top: 22px; padding: 14px 20px; background: rgba(248,165,194,0.13);
    border-radius: 20px; color: #a0526e; font-size: 14px; letter-spacing: 2px; line-height: 1.9;
  }
  .countdown-box strong { color: #c44569; font-size: 20px; letter-spacing: 1px; }

  .hint {
    margin-top: 24px; font-size: 12px; color: #d4a0b4; letter-spacing: 2px;
    animation: fadeHint 3s ease-in-out infinite;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 1; }
  }

  /* 信箱 */
  .mailbox-btn {
    position: fixed; z-index: 10; bottom: 28px; right: 28px;
    width: 46px; height: 46px; border-radius: 50%;
    border: 1.5px solid rgba(196,68,105,0.25);
    background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
    cursor: pointer; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; box-shadow: 0 2px 12px rgba(196,68,105,0.12);
  }
  .mailbox-btn:hover { background: rgba(255,255,255,0.8); transform: scale(1.08); }
  .mailbox-btn .badge {
    position: absolute; top: -4px; right: -4px;
    background: #c44569; color: #fff; font-size: 10px; min-width: 18px;
    height: 18px; border-radius: 9px; display: flex; align-items: center;
    justify-content: center; font-family: sans-serif; letter-spacing: 0;
  }

  /* 合照墙按钮 */
  .gallery-btn {
    position: fixed; z-index: 10; bottom: 28px; left: 28px;
    width: 46px; height: 46px; border-radius: 50%;
    border: 1.5px solid rgba(196,68,105,0.25);
    background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
    cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; box-shadow: 0 2px 12px rgba(196,68,105,0.12);
  }
  .gallery-btn:hover { background: rgba(255,255,255,0.8); transform: scale(1.08); }

  /* 合照墙浮层 */
  .gallery-overlay {
    position: fixed; z-index: 200; inset: 0;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    animation: overlayIn 0.35s ease;
  }
  .gallery-container {
    background: linear-gradient(160deg, #fff9fb, #fff5f8, #fff);
    border-radius: 28px; max-width: 620px; width: 94%; max-height: 82vh;
    box-shadow: 0 20px 60px rgba(196,68,105,0.25);
    border: 1px solid rgba(248,165,194,0.35);
    animation: letterIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .gallery-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 14px; border-bottom: 1px solid rgba(248,165,194,0.18);
    flex-shrink: 0;
  }
  .gallery-title { font-size: 17px; color: #c44569; letter-spacing: 3px; font-weight: bold; }
  .gallery-close {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(196,68,105,0.2);
    background: rgba(255,255,255,0.6); cursor: pointer; font-size: 16px; color: #c44569;
    display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
  }
  .gallery-close:hover { background: rgba(196,68,105,0.08); }
  .gallery-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .gallery-grid { display: flex; gap: 10px; }
  .gallery-col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .gallery-item {
    border-radius: 12px; overflow: hidden; cursor: pointer;
    box-shadow: 0 2px 8px rgba(196,68,105,0.12);
    border: 2px solid rgba(255,255,255,0.8);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .gallery-item:hover { transform: scale(1.03); box-shadow: 0 4px 16px rgba(196,68,105,0.22); }
  .gallery-item img { width: 100%; display: block; }

  /* 大图灯箱 */
  .gallery-lightbox {
    position: fixed; z-index: 300; inset: 0; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center;
    animation: overlayIn 0.3s ease;
  }
  .gallery-lightbox img {
    max-width: 94%; max-height: 90vh; border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4); border: 3px solid rgba(255,255,255,0.3);
  }
  .gallery-lightbox-close {
    position: absolute; top: 20px; right: 20px; width: 40px; height: 40px;
    border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.4); color: #fff; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .mailbox-overlay {
    position: fixed; z-index: 200; inset: 0;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    animation: overlayIn 0.35s ease;
    pointer-events: auto;
  }
  @keyframes overlayIn { 0% { opacity: 0; } 100% { opacity: 1; } }

  .mailbox-container {
    background: linear-gradient(160deg, #fff9fb, #fff5f8, #fff);
    border-radius: 28px; padding: 0; max-width: 440px; width: 90%; max-height: 80vh;
    box-shadow: 0 20px 60px rgba(196,68,105,0.25);
    border: 1px solid rgba(248,165,194,0.35);
    animation: letterIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden; display: flex; flex-direction: column;
  }
  @keyframes letterIn {
    0% { transform: scale(0.75) translateY(40px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .mailbox-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 28px 16px; border-bottom: 1px solid rgba(248,165,194,0.18);
  }
  .mailbox-title { font-size: 18px; color: #c44569; letter-spacing: 3px; font-weight: bold; }
  .mailbox-close {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(196,68,105,0.2);
    background: rgba(255,255,255,0.6); cursor: pointer; font-size: 16px; color: #c44569;
    display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
  }
  .mailbox-close:hover { background: rgba(196,68,105,0.08); }

  .mailbox-list {
    flex: 1; overflow-y: auto; padding: 16px 24px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .mailbox-empty { text-align: center; color: #c4859a; padding: 40px 0; letter-spacing: 2px; font-size: 14px; }

  .envelope {
    background: #fff; border-radius: 16px; padding: 16px 18px;
    border: 1px solid rgba(248,165,194,0.2);
    box-shadow: 0 2px 8px rgba(196,68,105,0.06);
    cursor: pointer; transition: all 0.25s ease;
    display: flex; align-items: center; gap: 14px;
  }
  .envelope:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(196,68,105,0.14); border-color: rgba(248,165,194,0.4); }
  .envelope.new { animation: envNew 0.6s ease; }
  @keyframes envNew {
    0% { transform: scale(0.9); background: #fff5f8; }
    100% { transform: scale(1); background: #fff; }
  }
  .envelope-icon { font-size: 32px; flex-shrink: 0; }
  .envelope-info { flex: 1; min-width: 0; }
  .envelope-author { font-size: 12px; color: #c4859a; letter-spacing: 1.5px; margin-bottom: 2px; }
  .envelope-title { font-size: 15px; color: #c44569; font-weight: bold; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .envelope-date { font-size: 11px; color: #dbb6c4; margin-top: 3px; letter-spacing: 1px; }
  .envelope-arrow { color: #dbb6c4; font-size: 14px; flex-shrink: 0; }

  /* 未读标记 */
  .unread-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #c44569; vertical-align: middle; margin-left: 5px;
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* 滚动条美化 */
  .mailbox-list::-webkit-scrollbar { width: 5px; }
  .mailbox-list::-webkit-scrollbar-track { background: transparent; }
  .mailbox-list::-webkit-scrollbar-thumb {
    background: rgba(196,68,105,0.18); border-radius: 10px;
  }
  .mailbox-list::-webkit-scrollbar-thumb:hover { background: rgba(196,68,105,0.35); }

  .mailbox-footer { padding: 12px 24px 20px; border-top: 1px solid rgba(248,165,194,0.18); }
  .mailbox-compose-btn {
    width: 100%; padding: 13px; border-radius: 20px; letter-spacing: 2px;
    border: 1.5px dashed rgba(196,68,105,0.3); background: rgba(248,165,194,0.08);
    color: #c44569; font-size: 15px; cursor: pointer; transition: all 0.3s ease;
  }
  .mailbox-compose-btn:hover { background: rgba(248,165,194,0.18); border-style: solid; }

  .mailbox-tools {
    display: flex; gap: 10px; margin-top: 10px;
  }
  .mailbox-tool-btn {
    flex: 1; padding: 9px 8px; border-radius: 16px; letter-spacing: 1px;
    border: 1px solid rgba(196,68,105,0.18); background: rgba(255,255,255,0.5);
    color: #b07a8e; font-size: 13px; cursor: pointer; transition: all 0.3s ease;
  }
  .mailbox-tool-btn:hover { background: rgba(255,255,255,0.8); border-color: rgba(196,68,105,0.35); }

  /* 写信面板 */
  .compose-panel { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .compose-author-toggle {
    display: flex; gap: 10px; justify-content: center;
  }
  .compose-author-btn {
    padding: 8px 22px; border-radius: 18px; border: 1px solid rgba(196,68,105,0.2);
    background: rgba(255,255,255,0.5); cursor: pointer; font-size: 14px;
    color: #b07a8e; letter-spacing: 2px; transition: all 0.3s ease;
  }
  .compose-author-btn.active { background: #c44569; color: #fff; border-color: #c44569; }
  .compose-input {
    width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid rgba(196,68,105,0.2);
    font-size: 15px; color: #5a3a4a; background: rgba(255,255,255,0.7); outline: none;
    letter-spacing: 1px; font-family: inherit;
    transition: border-color 0.3s ease;
  }
  .compose-input:focus { border-color: rgba(196,68,105,0.5); }
  .compose-textarea {
    width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid rgba(196,68,105,0.2);
    font-size: 14px; color: #5a3a4a; background: rgba(255,255,255,0.7); outline: none;
    letter-spacing: 1px; font-family: inherit; resize: none; line-height: 1.8;
    transition: border-color 0.3s ease;
  }
  .compose-textarea:focus { border-color: rgba(196,68,105,0.5); }
  .compose-actions { display: flex; gap: 10px; }
  .compose-send {
    flex: 1; padding: 12px; border-radius: 20px; border: none;
    background: #c44569; color: #fff; font-size: 15px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.3s ease;
  }
  .compose-send:hover { background: #b03d5e; }
  .compose-cancel {
    padding: 12px 20px; border-radius: 20px; border: 1px solid rgba(196,68,105,0.2);
    background: rgba(255,255,255,0.6); color: #b07a8e; font-size: 14px;
    letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease;
  }
  .compose-cancel:hover { background: rgba(255,255,255,0.9); }

  /* 信件详情 */
  .letter-view { padding: 28px 28px 20px; text-align: center; }
  .letter-view-icon { font-size: 52px; margin-bottom: 6px; }
  .letter-view-author { font-size: 13px; color: #c4859a; letter-spacing: 2px; margin-bottom: 4px; }
  .letter-view-title { font-size: 20px; color: #c44569; font-weight: bold; letter-spacing: 2px; margin-bottom: 4px; }
  .letter-view-date { font-size: 11px; color: #dbb6c4; letter-spacing: 1px; margin-bottom: 16px; }
  .letter-view-body { font-size: 15px; color: #7a4a5c; line-height: 2.1; letter-spacing: 1px; }
  .letter-view-back {
    margin-top: 20px; padding: 10px 28px; border-radius: 20px;
    border: 1px solid rgba(196,68,105,0.25); background: rgba(255,255,255,0.6);
    color: #c44569; font-size: 14px; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease;
  }
  .letter-view-back:hover { background: rgba(196,68,105,0.06); }

	  /* 对方打开提醒 */
	  .visitor-indicator {
	    position: fixed; z-index: 10; top: 24px; left: 24px;
	    display: flex; align-items: center; gap: 8px; cursor: pointer;
	    opacity: 0.7; transform: translateY(0); transition: all 0.5s ease;
	    pointer-events: auto;
	  }
	  .visitor-indicator.alert { opacity: 1; }
	  .visitor-dot {
	    width: 40px; height: 40px; border-radius: 50%;
	    background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
	    border: 1.5px solid rgba(196,68,105,0.25);
	    display: flex; align-items: center; justify-content: center; font-size: 18px;
	    box-shadow: 0 2px 12px rgba(196,68,105,0.12);
	    transition: all 0.3s ease;
	  }
	  .visitor-dot.pulse { animation: visitorPulse 2s ease-in-out infinite; }
  @keyframes visitorPulse {
    0%, 100% { box-shadow: 0 2px 12px rgba(196,68,105,0.12); }
    50% { box-shadow: 0 2px 24px rgba(196,68,105,0.4), 0 0 0 6px rgba(255,107,138,0.15); }
  }
  .visitor-label {
    background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
    border-radius: 16px; padding: 6px 14px; font-size: 12px;
    color: #a0526e; letter-spacing: 1.5px; white-space: nowrap;
    border: 1px solid rgba(248,165,194,0.2);
    box-shadow: 0 2px 8px rgba(196,68,105,0.08);
  }

  .music-btn {
    position: fixed; z-index: 10; top: 24px; right: 24px;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1.5px solid rgba(196,68,105,0.25);
    background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
    cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; box-shadow: 0 2px 12px rgba(196,68,105,0.12);
  }
  .music-btn:hover { background: rgba(255,255,255,0.8); transform: scale(1.08); }
  .music-btn.playing { border-color: rgba(196,68,105,0.4); box-shadow: 0 2px 16px rgba(196,68,105,0.2); }
  .music-btn.playing .note { animation: noteSpin 2s linear infinite; }
  @keyframes noteSpin {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(15deg); }
  }

  @media (max-width: 480px) {
    body { overflow-y: auto; overflow-x: hidden; }
    .card { padding: 32px 20px 28px; border-radius: 28px; width: 92%; max-width: 380px; }
    .couple { gap: 10px; margin-bottom: 8px; }
    .couple-name { font-size: 20px; letter-spacing: 2px; padding: 5px 10px; border-radius: 12px; border-width: 1.5px; }
    .couple-name.me { box-shadow: 0 0 0 3px rgba(196,68,105,0.06); }
    .couple-heart { font-size: 24px; }
    .subtitle { font-size: 14px; margin-bottom: 22px; letter-spacing: 2px; }
    .divider { margin-bottom: 20px; }
    .together-label { font-size: 14px; margin-bottom: 2px; letter-spacing: 2px; }
    .main-days { font-size: 56px; letter-spacing: -1px; }
    .main-days-unit { font-size: 13px; margin-bottom: 6px; letter-spacing: 2px; }

    /* 统计行：flex换行，数字+单位在一行 */
    .stat-row { gap: 4px 8px; margin: 18px 0 14px; font-size: 12px; }
    .stat-item {
      display: inline-flex; flex-direction: row; align-items: baseline;
      background: rgba(248,165,194,0.08); border-radius: 10px;
      padding: 5px 9px;
    }

    // 检测到新版本时自动刷新
    reg.onupdatefound = function() {
      var newWorker = reg.installing;
      if (!newWorker) return;
      newWorker.onstatechange = function() {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          // 新 SW 已就绪，通知刷新
          if (confirm('有新版本，是否刷新？')) {
            newWorker.postMessage('skipWaiting');
            window.location.reload();
          }
        }
      };
    };
  }).catch(function(err) {
    console.log('SW failed:', err);
  });
}
